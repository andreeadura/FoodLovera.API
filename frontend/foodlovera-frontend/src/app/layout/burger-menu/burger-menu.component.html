<div class="drawer" [class.drawer--open]="open" aria-hidden="{{ !open }}">
  <div class="drawer__backdrop" (click)="onBackdropClick()"></div>

  <aside class="drawer__panel" role="dialog" aria-modal="true">
    <button class="drawer__close" type="button" (click)="onClose()" aria-label="Close">
      ✕
    </button>

    <nav class="drawer__nav">
      <a class="drawer__link" routerLink="/sessions/join" (click)="onClose()">
        {{ 'menu.joinRoom' | translate }}
      </a>

      <a class="drawer__link" routerLink="/sessions/create" (click)="onClose()">
        {{ 'menu.createRoom' | translate }}
      </a>

      <a
        class="drawer__link"
        *ngIf="isAuthenticated"
        routerLink="/user/profile"
        (click)="onClose()"
      >
        {{ 'menu.profile' | translate }}
      </a>
    </nav>
  </aside>
</div>
